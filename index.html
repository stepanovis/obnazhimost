  header .brand{font-weight:500}

  section{padding:140px 8vw;border-bottom:1px solid #eee}
  section.hero{padding:24vh 8vw 18vh;text-align:left}
  section.dark{background:#0a0a0a;color:#f4f4f4;border-bottom-color:#0a0a0a}
  section.dark .eyebrow,section.dark .meta{color:#888}
  section.dark a{border-bottom-color:#f4f4f4}

  .eyebrow{
    font-size:11px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--mute);margin-bottom:24px;
  }
  h1{
    font-family:var(--serif);font-weight:300;
    font-size:clamp(56px,12vw,180px);line-height:.95;letter-spacing:-.02em;
    margin-bottom:32px;
  }
  h1 .tick{font-size:.5em;vertical-align:super;opacity:.5}
  h2{
    font-family:var(--serif);font-weight:300;font-style:italic;
    font-size:clamp(34px,5vw,64px);line-height:1.05;letter-spacing:-.01em;
    margin-bottom:40px;max-width:18ch;
  }
  h3{
    font-size:11px;letter-spacing:.22em;text-transform:uppercase;
    font-weight:500;margin:48px 0 16px;
  }
  p{
    font-family:var(--serif);font-size:clamp(19px,1.6vw,24px);
    line-height:1.55;font-weight:300;max-width:62ch;margin-bottom:1.1em;
  }
  p.small{font-family:var(--sans);font-size:14px;line-height:1.6;color:var(--mute);max-width:60ch}
  blockquote{
    font-family:var(--serif);font-style:italic;font-weight:300;
    font-size:clamp(28px,3.4vw,46px);line-height:1.25;
    max-width:24ch;margin:0 auto;text-align:center;
  }
  ul{font-family:var(--serif);font-size:clamp(18px,1.5vw,22px);line-height:1.7;list-style:none;max-width:62ch}
  ul li{padding-left:24px;position:relative;margin-bottom:.5em}
  ul li::before{content:"—";position:absolute;left:0;opacity:.5}

  .grid{display:grid;gap:48px;align-items:start}
  .grid.two{grid-template-columns:1fr 1fr}
  .grid.text-img{grid-template-columns:1fr 1.1fr;gap:80px;align-items:center}
  .grid.img-text{grid-template-columns:1.1fr 1fr;gap:80px;align-items:center}
  @media(max-width:860px){
    section{padding:90px 7vw}
    .grid.two,.grid.text-img,.grid.img-text{grid-template-columns:1fr;gap:40px}
    h2{max-width:none}
  }

  .gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:40px}
  @media(max-width:700px){.gallery{grid-template-columns:repeat(2,1fr)}}

  .meta{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--mute)}

  footer{padding:80px 8vw 60px;text-align:center;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--mute)}
  footer a{border:none}
  footer .name{font-family:var(--serif);font-style:italic;font-size:24px;text-transform:none;letter-spacing:0;color:var(--ink);display:block;margin-bottom:8px}

function setLang(lang){
  document.documentElement.lang = lang;
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const key = el.getAttribute("data-i18n");
    if(i18n[lang] && i18n[lang][key]) el.textContent = i18n[lang][key];
  });
  document.querySelectorAll("header nav button").forEach(b=>{
    b.classList.toggle("active", b.dataset.lang===lang);
  });
  try{localStorage.setItem("obz_lang",lang)}catch(e){}
}
document.querySelectorAll("header nav button").forEach(b=>{
  b.addEventListener("click",()=>setLang(b.dataset.lang));
});
const saved = (()=>{try{return localStorage.getItem("obz_lang")}catch(e){return null}})();
const initial = saved || (navigator.language||"en").slice(0,2);
setLang(["en","pt","ru"].includes(initial)?initial:"en");
